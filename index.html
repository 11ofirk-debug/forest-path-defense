<!DOCTYPE html>
<html>
<head>
    <title>Forest Path Defense</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Forest Path Defense</h1>
    <p>Wave: <span id="wave">1</span></p>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="640" height="480"></canvas>

        <div id="sidePanel">
            <h2>Base</h2>
            <p>Lives: <span id="lives">10</span></p>
            <p>Gold: <span id="gold">100</span></p>

            <hr>

            <h2>Build</h2>
            <button id="towerButton">Wooden Tower - 50g</button>

            <p id="message">Click the button, then click the forest to place a tower.</p>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
