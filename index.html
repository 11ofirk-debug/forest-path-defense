<!DOCTYPE html>
<html>
<head>
    <title>Forest Path Defense</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Forest Path Defense</h1>
    <p>Wave: <span id="wave">1</span></p>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>

        <div id="sidePanel">
            <h2>Base</h2>
            <p>Fence HP: <span id="lives">30</span></p>
            <p>Gold: <span id="gold">100</span></p>

            <hr>

            <h2>Build</h2>
            <p id="message">Click a purple slot to place a tower.</p>
            <hr>
            <h2>Elias</h2>
            <p style="font-size:11px; color:#aaa; margin-bottom:8px;">Press 1 or 2 then click the canvas to activate</p>
            <div style="display:flex; gap:10px; margin-top:8px;">
                <div style="text-align:center;">
                    <canvas id="molotovTimer" width="60" height="80"></canvas>
                    <div style="font-size:11px; margin-top:4px;">1 - Molotov</div>
                </div>
                <div style="text-align:center;">
                    <canvas id="acidTimer" width="60" height="80"></canvas>
                    <div style="font-size:11px; margin-top:4px;">2 - Acid</div>
                </div>
            </div>
            <p id="skillMessage" style="font-size:11px; color:#aaa;"></p>

            
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
