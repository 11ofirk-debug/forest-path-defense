<!DOCTYPE html>
<html>
<head>
    <title>Forest Path Defense</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Forest Path Defense</h1>
    <p>Wave: <span id="wave">1</span></p>

        </div>
    </div>

    <script src="game.js"></script>

</html>
